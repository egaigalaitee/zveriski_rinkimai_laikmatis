<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Žvėriško žaidimo laikmatis</title>

  <!-- Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f3f3f3;
      color: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 1000px;
      padding: 20px;
    }

    h1 {
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 700;
      margin-bottom: 40px;
    }

    /* TIME BUTTONS */
    .time-select {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .time-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid #000;
      background: #000;
      color: #fff;
      font-size: 42px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;

      /* CENTRAVIMAS */
      display: flex;
      justify-content: center;
      align-items: center;

      line-height: 1;
    }

    .time-btn:hover {
      background: #fff;
      color: #000;
    }

    .time-btn.active {
      background: #fff;
      color: #000;
    }

    /* TIMER */
    #time {
      font-size: clamp(100px, 18vw, 200px);
      font-weight: 800;
      margin: 20px 0 40px;
      letter-spacing: -3px;
    }

    /* CONTROL BUTTONS */
    .controls {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .control-btn {
      padding: 14px 28px;
      border-radius: 999px;
      border: 2px solid #000;
      background: #000;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .control-btn:hover {
      background: #fff;
      color: #000;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .time-btn {
        width: 70px;
        height: 70px;
        font-size: 30px;
      }

      .controls {
        flex-direction: column;
        gap: 10px;
      }
    }

  </style>
</head>

<body>

<div class="container">
  <h1>Žvėriško žaidimo laikmatis</h1>

  <div class="time-select">
    <button class="time-btn active" onclick="setTime(180, this)">3</button>
    <button class="time-btn" onclick="setTime(300, this)">5</button>
    <button class="time-btn" onclick="setTime(600, this)">10</button>
  </div>

  <div id="time">3:00</div>

  <div class="controls">
    <button class="control-btn" onclick="pauseTimer()">Sustabdyti</button>
    <button class="control-btn" onclick="startTimer()">Pratęsti</button>
  </div>
</div>

<script>
let time = 180;
let initialTime = 180;
let timer = null;

function updateDisplay() {
  const minutes = Math.floor(time / 60);
  const seconds = time % 60;
  document.getElementById("time").textContent =
    `${minutes}:${String(seconds).padStart(2, "0")}`;
}

function setTime(seconds, btn) {
  clearInterval(timer);
  timer = null;

  time = seconds;
  initialTime = seconds;
  updateDisplay();

  document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function startTimer() {
  if (timer) return;

  timer = setInterval(() => {
    if (time > 0) {
      time--;
      updateDisplay();
    } else {
      clearInterval(timer);
      timer = null;
      alert("Laikas baigėsi!");
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timer);
  timer = null;
}

updateDisplay();
</script>

</body>
</html>
