<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Žvėriško žaidimo laikmatis</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f3f3f3;
      --text: #000;
      --black: #000;
      --white: #fff;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

    .app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .timer-card {
      width: 100%;
      max-width: 1400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .title {
      margin: 0;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .time-options {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .time-btn {
      border-radius: 50%;
      border: 2px solid var(--black);
      background: var(--black);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .time-btn.active {
      background: var(--white);
      color: var(--black);
      border: 2px solid var(--black);
    }

    .timer-display {
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.05em;
      margin: 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .control-btn {
      border-radius: 999px;
      border: 2px solid var(--black);
      background: var(--black);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      font-size: 18px;
      font-weight: 500;
      opacity: 0.9;
    }

    /* PHONE: 393x852 style */
    @media (max-width: 767px) {
      .app {
        padding: 16px 18px;
      }

      .timer-card {
        max-width: 393px;
      }

      .title {
        font-size: 28px;
        max-width: 300px;
        margin-bottom: 40px;
      }

      .time-options {
        gap: 16px;
        margin-bottom: 54px;
      }

      .time-btn {
        width: 54px;
        height: 54px;
        font-size: 24px;
      }

      .timer-display {
        font-size: 92px;
        margin-bottom: 44px;
      }

      .controls {
        flex-direction: column;
        gap: 24px;
      }

      .control-btn {
        min-width: 100px;
        height: 28px;
        padding: 0 18px;
        font-size: 14px;
      }

      .status {
        font-size: 14px;
        margin-top: 24px;
      }
    }

    /* 1280x720 style */
    @media (min-width: 768px) and (max-width: 1365px) {
      .app {
        padding: 24px 40px;
      }

      .timer-card {
        max-width: 1200px;
      }

      .title {
        font-size: 44px;
        margin-bottom: 32px;
      }

      .time-options {
        gap: 52px;
        margin-bottom: 28px;
      }

      .time-btn {
        width: 62px;
        height: 62px;
        font-size: 24px;
      }

      .timer-display {
        font-size: 128px;
        margin-bottom: 34px;
      }

      .controls {
        flex-direction: row;
        gap: 18px;
      }

      .control-btn {
        min-width: 110px;
        height: 38px;
        padding: 0 24px;
        font-size: 16px;
      }

      .status {
        font-size: 16px;
      }
    }

    /* 1440x1024 style */
    @media (min-width: 1366px) {
      .app {
        padding: 40px 56px;
      }

      .timer-card {
        max-width: 1400px;
      }

      .title {
        font-size: 56px;
        margin-bottom: 40px;
      }

      .time-options {
        gap: 62px;
        margin-bottom: 34px;
      }

      .time-btn {
        width: 76px;
        height: 76px;
        font-size: 34px;
      }

      .timer-display {
        font-size: 170px;
        margin-bottom: 42px;
      }

      .controls {
        flex-direction: row;
        gap: 22px;
      }

      .control-btn {
        min-width: 132px;
        height: 44px;
        padding: 0 28px;
        font-size: 18px;
      }

      .status {
        font-size: 18px;
      }
    }

    /* Hover tik desktopui / įrenginiams su pele */
    @media (hover: hover) and (pointer: fine) and (min-width: 768px) {
      .time-btn:hover {
        background: var(--white);
        color: var(--black);
        border: 2px solid var(--black);
      }

      .control-btn:hover {
        background: var(--white);
        color: var(--black);
        border: 2px solid var(--black);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="timer-card">
      <h1 class="title">Žvėriško žaidimo laikmatis</h1>

      <div class="time-options">
        <button class="time-btn active" onclick="setTime(180, this)">3</button>
        <button class="time-btn" onclick="setTime(300, this)">5</button>
        <button class="time-btn" onclick="setTime(600, this)">10</button>
      </div>

      <div id="timerDisplay" class="timer-display">3:00</div>

      <div class="controls">
        <button class="control-btn" onclick="startTimer()">Pradėti</button>
        <button class="control-btn" onclick="pauseTimer()">Sustabdyti</button>
        <button class="control-btn" onclick="resumeTimer()">Pratęsti</button>
      </div>

      <div id="status" class="status"></div>
    </main>
  </div>

  <audio id="endSound" preload="auto">
    <source src="Laikrodzio.mp3" type="audio/mpeg">
  </audio>

  <script>
    let time = 180;
    let initialTime = 180;
    let timer = null;
    let hasStarted = false;

    const endSound = document.getElementById("endSound");

    function updateDisplay() {
      const minutes = Math.floor(time / 60);
      const seconds = time % 60;
      document.getElementById("timerDisplay").textContent =
        `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    function updateStatus(text = "") {
      document.getElementById("status").textContent = text;
    }

    function setTime(seconds, btn) {
      clearInterval(timer);
      timer = null;
      time = seconds;
      initialTime = seconds;
      hasStarted = false;
      updateDisplay();
      updateStatus("");

      document.querySelectorAll(".time-btn").forEach(button => {
        button.classList.remove("active");
      });
      btn.classList.add("active");
    }

    function unlockAudio() {
      endSound.play().then(() => {
        endSound.pause();
        endSound.currentTime = 0;
      }).catch(() => {});
    }

    function playEndSound() {
      endSound.currentTime = 0;
      endSound.play().catch(() => {
        alert("Laikas baigėsi!");
      });
    }

    function startCountdown() {
      timer = setInterval(() => {
        if (time > 0) {
          time--;
          updateDisplay();
        } else {
          clearInterval(timer);
          timer = null;
          updateStatus("Laikas baigėsi!");
          playEndSound();
        }
      }, 1000);
    }

    function startTimer() {
      unlockAudio();

      clearInterval(timer);
      timer = null;

      time = initialTime;
      updateDisplay();
      updateStatus("");
      hasStarted = true;

      startCountdown();
    }

    function pauseTimer() {
      clearInterval(timer);
      timer = null;
      if (hasStarted && time > 0) {
        updateStatus("Laikmatis sustabdytas");
      }
    }

    function resumeTimer() {
      unlockAudio();

      if (timer || time <= 0) return;
      hasStarted = true;
      updateStatus("");
      startCountdown();
    }

    updateDisplay();
  </script>
</body>
</html>
